name: Test Ubicloud Prod Runners

on:
  push:
    branches: [enes/test-doppler]
  # schedule:
  #   - cron: '0 * * * *'

jobs:
  test:
    # container:
    #   image: ubuntu:latest
      # options: --init
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - ubicloud-premium-2-ubuntu-2204
          - ubicloud-premium-2-ubuntu-2404
          - ubicloud-premium-2-ubuntu-2204
          - ubicloud-premium-2-ubuntu-2404
          - ubicloud-premium-2-ubuntu-2204
          - ubicloud-premium-2-ubuntu-2404
          - ubicloud-premium-2-ubuntu-2204
          - ubicloud-premium-2-ubuntu-2404
          - ubicloud-premium-2-ubuntu-2204
          - ubicloud-premium-2-ubuntu-2404
          - ubicloud-premium-2-ubuntu-2204
          - ubicloud-premium-2-ubuntu-2404
          - ubicloud-premium-2-ubuntu-2204
          - ubicloud-premium-2-ubuntu-2404


    runs-on: ${{ matrix.runs-on }}
    name: ${{ matrix.runs-on }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download doppler cli
        run: |
          set +e
          headers=$(curl --tlsv1.2 --proto "=https" -w "%{http_code}" --retry 5 -o "doppler-download.tar" -LN -D - "https://cli.doppler.com/download?os=linux&arch=amd64&format=tar" 2>&1)
          exit_code=$?
          set -e
          status_code="$(echo "$headers" | tail -1)"
          echo "Exit code: $exit_code" >> $GITHUB_STEP_SUMMARY
          echo "Status code: $status_code" >> $GITHUB_STEP_SUMMARY
