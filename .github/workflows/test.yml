    runs-on: ${{ matrix.runs-on }}
    name: ${{ matrix.runs-on }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download doppler cli
        run: |
          wget -q https://cli.doppler.com/install.sh
          chmod +x install.sh
          ./install.sh --debug --no-package-manager --install-path "./"
