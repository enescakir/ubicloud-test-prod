name: Test Ubicloud Prod Runners

on:
  push:
    branches: [checkout-benchmark]
  # schedule:
  #   - cron: '0 * * * *'

jobs:
  test:
    # container:
    #   image: ubuntu:latest
      # options: --init
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - ubicloud-standard-2-ubuntu-2404
          - ubicloud-standard-2-ubuntu-2204
          - ubuntu-latest

    runs-on: ${{ matrix.runs-on }}
    name: ${{ matrix.runs-on }}
    steps:
      - name: github curl
        run: |
          curl -o /dev/null -w "%{speed_download} bytes/s, %{time_total}s\n" -L https://github.com/git/git/archive/refs/tags/v2.45.0.tar.gz

      - name: cloudflare curl
        run: |
          curl -o /dev/null -w "%{speed_download} bytes/s, %{time_total}s\n" https://speed.cloudflare.com/__down?bytes=104857600
      
      - name: aws curl
        run: |
          curl -o /dev/null -w "%{speed_download} bytes/s, %{time_total}s\n" https://s3.eu-central-1.amazonaws.com/public-test-bucket/100mb.bin
    
      - name: checkout
        uses: actions/checkout@v6
      - name: check kernel
        run: uname -a
      - run: ./net-debug.sh

