name: Test Ubicloud Prod Runners

on:
  push:
    branches: [enes/test-playwright]
  # schedule:
  #   - cron: '0 * * * *'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - ubicloud-standard-2-ubuntu-2404
          - ubicloud-standard-2-ubuntu-2404
          - ubuntu-latest
          - ubuntu-latest

    runs-on: ${{ matrix.runs-on }}
    name: ${{ matrix.runs-on }}
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
 
      - name: Install npm dependencies
        run: npm ci
 
      # Pin cache key to the Playwright version so browsers are redownloaded
      # only when Playwright itself bumps — not on unrelated dependency changes.
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
 
      # - run: npx playwright install --with-deps chromium chrome
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
 
      # Chromium lives in ~/.cache/ms-playwright and is cached above.
      - name: Install Chromium (only on cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium chrome
 
      # System libraries (shared objects under /usr/lib etc.) — fast to (re)install,
      # not worth caching. Always run so the browsers can actually launch.
      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium chrome
