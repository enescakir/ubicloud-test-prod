name: Test Ubicloud Prod Runners

on:
  push:
    branches: [checkout-benchmark]
  # schedule:
  #   - cron: '0 * * * *'

jobs:
  test:
    # container:
    #   image: ubuntu:latest
      # options: --init
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - ubicloud-standard-2-ubuntu-2404
          - ubicloud-standard-2-ubuntu-2204
          - ubuntu-latest

    runs-on: ${{ matrix.runs-on }}
    name: ${{ matrix.runs-on }}
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: check kernel
        run: uname -a
      - run: ./net-debug.sh

