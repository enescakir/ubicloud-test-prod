    runs-on: ${{ matrix.runs-on }}
    name: ${{ matrix.runs-on }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install doppler cli
        run: |
          binDir="${{ github.workspace }}/bin"
          mkdir -p "$binDir"
          (curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh) | sudo sh -s -- --debug --no-package-manager --install-path "$binDir"
          echo "$binDir" >> $GITHUB_PATH

      - name: check doppler cli version
        run: doppler --version